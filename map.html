<!DOCTYPE html>
<html lang="ru">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Карта ВОВ</title>
	<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		html,
		body {
			width: 100%;
			height: 100%;
			background: #1a1a2e;
			overflow: hidden;
		}

		#map {
			width: 100%;
			height: 100%;
		}

		#eraser-cursor {
			position: fixed;
			border: 2px solid rgba(255, 100, 100, 0.9);
			border-radius: 50%;
			pointer-events: none;
			display: none;
			transform: translate(-50%, -50%);
			z-index: 9999;
			background: rgba(255, 100, 100, 0.15);
		}

		#brush-cursor {
			position: fixed;
			border: 2px solid rgba(0, 0, 0, 0.7);
			border-radius: 50%;
			pointer-events: none;
			display: none;
			transform: translate(-50%, -50%);
			z-index: 9999;
			background: transparent;
		}

		/* FIX лог: pointer-events:auto + user-select:text — текст можно выделить и скопировать */
		#debug-log {
			position: fixed;
			bottom: 0;
			left: 0;
			right: 0;
			max-height: 200px;
			overflow-y: auto;
			background: rgba(0, 0, 0, 0.88);
			color: #0f0;
			font: 11px monospace;
			padding: 4px 8px;
			z-index: 10000;
			pointer-events: auto;
			user-select: text;
			-webkit-user-select: text;
			display: none;
		}

		#debug-log.visible {
			display: block;
		}

		#debug-log .py-log {
			color: #4fc3f7;
		}

		/* Кнопка копирования лога */
		#debug-copy-btn {
			position: fixed;
			bottom: 4px;
			right: 8px;
			z-index: 10001;
			padding: 2px 8px;
			background: #333;
			color: #0f0;
			border: 1px solid #0f0;
			border-radius: 3px;
			font: 11px monospace;
			cursor: pointer;
			display: none;
		}

		#debug-log.visible~#debug-copy-btn {
			display: block;
		}

		.obj-tooltip {
			background: #222;
			color: #eee;
			border: 1px solid #555;
			font-size: 11px;
			padding: 2px 6px;
			border-radius: 3px;
		}

		.selected-path {
			filter: drop-shadow(0 0 6px #00aaff);
		}

		/* FIX #6: text-shadow убирается инлайн в buildTextIcon (text-shadow:none) */
		.text-marker-wrap {
			white-space: nowrap;
			user-select: none;
			display: inline-block;
			transform: translate(-50%, -50%);
		}

		/* FIX #4: курсор «палец» в режиме select */
		body.tool-select #map {
			cursor: pointer;
		}

		body.tool-brush #map {
			cursor: crosshair;
		}

		body.tool-eraser #map {
			cursor: none;
		}

		body.tool-text #map {
			cursor: text;
		}

		/* FIX #5: курсор при перетаскивании текстового маркера */
		.text-marker-wrap {
			cursor: grab;
		}

		.text-marker-wrap:active {
			cursor: grabbing;
		}

		/* Скрытие UI при экспорте */
		body.exporting .leaflet-control-container {
			display: none !important;
		}

		body.exporting #debug-log {
			display: none !important;
		}

		body.exporting #debug-copy-btn {
			display: none !important;
		}

		body.exporting #eraser-cursor {
			display: none !important;
		}

		body.exporting #brush-cursor {
			display: none !important;
		}

		/* Пробел-drag: временный курсор */
		body.space-pan #map {
			cursor: grab !important;
		}

		body.space-pan.panning #map {
			cursor: grabbing !important;
		}

		/* ── IMAGE MARKER ── */
		.image-marker-wrap {
			position: relative;
			display: inline-block;
			cursor: grab;
			user-select: none;
			-webkit-user-select: none;
		}

		.image-marker-wrap:active {
			cursor: grabbing;
		}

		.image-marker-wrap img {
			display: block;
			pointer-events: none;
		}

		.image-resize-handle {
			position: absolute;
			bottom: -6px;
			right: -6px;
			width: 16px;
			height: 16px;
			background: #fff;
			border: 2px solid #2e86c1;
			border-radius: 3px;
			cursor: nwse-resize;
			z-index: 9999;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 9px;
			color: #2e86c1;
			line-height: 1;
			pointer-events: auto;
		}

		.image-selected .image-marker-wrap img {
			outline: 2px solid #00aaff;
		}
	</style>
</head>

<body class="tool-select">

	<div id="map"></div>
	<div id="eraser-cursor"></div>
	<div id="brush-cursor"></div>
	<div id="fps-counter" style="
    position:fixed; top:8px; right:8px; z-index:9998;
    background:rgba(0,0,0,0.65); color:#0f0;
    font:12px monospace; padding:3px 8px; border-radius:4px;
    pointer-events:none; display:none;
	">FPS: --</div>
	<div id="debug-log"></div>
	<button id="debug-copy-btn" title="Копировать лог">📋 Копировать</button>

	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/Turf.js/6.5.0/turf.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
	<script src="qrc:///qtwebchannel/qwebchannel.js"></script>

	<script>
		// ═══════════════════════════════════════════════════════════
		//   ЛОГГЕР  (Ctrl+` — показать/скрыть)
		// ═══════════════════════════════════════════════════════════
		var debugEl = document.getElementById('debug-log');
		var debugCopyBtn = document.getElementById('debug-copy-btn');
		var debugVisible = false;

		// ── FPS COUNTER (Ctrl+F — показать/скрыть) ───────────────
		var fpsEl = document.getElementById('fps-counter');
		var fpsVisible = false;
		var _fpsLast = performance.now();
		var _fpsFrames = 0;
		function _fpsTick() {
			_fpsFrames++;
			var now = performance.now();
			if (now - _fpsLast >= 500) {
				var fps = Math.round(_fpsFrames * 1000 / (now - _fpsLast));
				fpsEl.textContent = 'FPS: ' + fps;
				_fpsFrames = 0;
				_fpsLast = now;
			}
			requestAnimationFrame(_fpsTick);
		}
		requestAnimationFrame(_fpsTick);

		document.addEventListener('keydown', function (e) {
			if (e.ctrlKey && e.key === 'f') {
				e.preventDefault();
				fpsVisible = !fpsVisible;
				fpsEl.style.display = fpsVisible ? 'block' : 'none';
			}
		});

		function log(msg) {
			var ts = new Date().toTimeString().slice(0, 8);
			var text = '[' + ts + '] ' + msg;
			console.log(text);
			var line = document.createElement('div');
			if (msg.indexOf('[PY]') === 0) line.className = 'py-log';
			line.textContent = text;
			debugEl.appendChild(line);
			debugEl.scrollTop = debugEl.scrollHeight;
			while (debugEl.children.length > 300) debugEl.removeChild(debugEl.firstChild);
		}

		document.addEventListener('keydown', function (e) {
			if (e.ctrlKey && e.key === '`') {
				debugVisible = !debugVisible;
				debugEl.classList.toggle('visible', debugVisible);
				debugCopyBtn.style.display = debugVisible ? 'block' : 'none';
			}
		});

		// BUG-LOG fix: кнопка копирования лога
		debugCopyBtn.addEventListener('click', function () {
			var text = Array.from(debugEl.children).map(function (el) { return el.textContent; }).join('\n');
			if (navigator.clipboard && navigator.clipboard.writeText) {
				navigator.clipboard.writeText(text).then(function () {
					debugCopyBtn.textContent = '✅ Скопировано';
					setTimeout(function () { debugCopyBtn.textContent = '📋 Копировать'; }, 1500);
				});
			} else {
				// fallback: выделить весь текст лога
				var range = document.createRange();
				range.selectNodeContents(debugEl);
				var sel = window.getSelection();
				sel.removeAllRanges();
				sel.addRange(range);
			}
		});

		// ═══════════════════════════════════════════════════════════
		//   ЭКСПОРТ: скрыть / показать Leaflet UI
		// ═══════════════════════════════════════════════════════════
		function hideMapUI() {
			document.body.classList.add('exporting');
			log('Export: UI hidden');
		}
		function showMapUI() {
			document.body.classList.remove('exporting');
			log('Export: UI restored');
		}

		// ═══════════════════════════════════════════════════════════
		//   ГЛОБАЛЬНОЕ СОСТОЯНИЕ
		// ═══════════════════════════════════════════════════════════
		var map;
		var bridge = null;
		var activeTool = 'select';
		var activeLayerId = null;
		var currentProjectPath = '';
		var spaceDown = false;

		var brushColor = '#ff0000';
		var brushSize = 4;
		var eraserSize = 20;
		var fontSize = 14;
		var fontColor = '#000000';
		var fontBold = true;
		var fontItalic = false;

		var layers = {};
		var layerOrder = [];

		var undoHistory = [];
		var MAX_HISTORY = 50;

		var selectedObj = null;

		var isDrawing = false;
		var currentPath = null;
		var currentPolyline = null;

		var isErasing = false;
		var eraserPath = [];
		var eraserCursorEl = document.getElementById('eraser-cursor');
		var brushCursorEl = document.getElementById('brush-cursor');

		var tileLayer = null;
		var currentTileType = 'map';
		var yandexApiKey = '';

		// ═══════════════════════════════════════════════════════════
		//   ПРОБЕЛ — временный pan (как в Photoshop)
		// ═══════════════════════════════════════════════════════════
		var spaceDown = false;

		document.addEventListener('keydown', function (e) {
			if (e.code === 'Space' && !e.ctrlKey && !e.altKey && activeTool !== 'select') {
				if (spaceDown) return;
				spaceDown = true;
				e.preventDefault();
				map.dragging.enable();
				document.body.classList.add('space-pan');
				log('Space pan: ON');
			}
		});
		document.addEventListener('keyup', function (e) {
			if (e.code === 'Space' && spaceDown) {
				spaceDown = false;
				document.body.classList.remove('space-pan', 'panning');
				if (activeTool !== 'select') map.dragging.disable();
				log('Space pan: OFF');
			}
		});

		// ═══════════════════════════════════════════════════════════
		//   ГОРЯЧИЕ КЛАВИШИ
		// ═══════════════════════════════════════════════════════════
		document.addEventListener('keydown', function (e) {
			// FIX #8: Ctrl+Z убран, Python-сторона обрабатывает через QShortcut
			if (e.ctrlKey && e.key === 's') {
				e.preventDefault();
				if (currentProjectPath) {
					saveProject(currentProjectPath);
				} else {
					if (bridge) bridge.onStatus('__SAVE_DIALOG__');
				}
			}
			if (e.key === 'Delete' || e.key === 'Backspace') {
				deleteSelected();
			}
		});

		function setProjectPath(path) {
			currentProjectPath = path;
			log('Project path set: ' + path);
		}

		// ═══════════════════════════════════════════════════════════
		//   ИНИЦИАЛИЗАЦИЯ
		// ═══════════════════════════════════════════════════════════
		function initMap(apiKey) {
			yandexApiKey = apiKey || '';
			if (map) { changeTileLayer(currentTileType, yandexApiKey); return; }

			map = L.map('map', {
				center: [55.0, 32.0],
				zoom: 5,
				zoomControl: true,
				preferCanvas: false,
				zoomSnap: 0.5,
				zoomDelta: 0.5,
				wheelPxPerZoomLevel: 120
			});
			map.getContainer().style.background = '#e8e0d8';
			L.control.scale({ position: 'bottomleft', imperial: false }).addTo(map);
			changeTileLayer('map', yandexApiKey);
			changeTileLayer('map', yandexApiKey);

			map.on('mousedown', onMapMouseDown);
			map.on('mousemove', onMapMouseMove);
			map.on('mouseup', onMapMouseUp);

			map.on('dragstart', function () { document.body.classList.add('panning'); });
			map.on('dragend', function () { document.body.classList.remove('panning'); });

			createLayer('layer_default', 'Слой 1');
			setActiveLayer('layer_default');

			new QWebChannel(qt.webChannelTransport, function (channel) {
				bridge = channel.objects.bridge;
				log('[Bridge] QWebChannel initialized, bridge object received');
				bridge.onStatus('Карта готова');
				log('[Bridge] Sending initial layers state to Qt...');
				sendLayersToQt();

				var tileReadySent = false;
				function sendMapReady() {
					if (tileReadySent) return;
					tileReadySent = true;
					log('[Bridge] MAP_READY sent (tiles loaded)');
					bridge.onStatus('__MAP_READY__');
				}
				tileLayer.on('load', sendMapReady);
				// Страховка если тайлы не загрузились за 12 сек
				setTimeout(sendMapReady, 12000);
			});

		}

		// ═══════════════════════════════════════════════════════════
		//   ТАЙЛЫ
		// ═══════════════════════════════════════════════════════════
		function changeTileLayer(type, apiKey) {
			currentTileType = type;
			if (apiKey) yandexApiKey = apiKey;
			if (tileLayer) map.removeLayer(tileLayer);
			var urlTemplates = {
				'map': 'https://tiles.api-maps.yandex.ru/v1/tiles/?apikey={key}&l=map&x={x}&y={y}&z={z}&lang=ru_RU',
				'sat': 'https://tiles.api-maps.yandex.ru/v1/tiles/?apikey={key}&l=sat&x={x}&y={y}&z={z}&lang=ru_RU',
				'skl': 'https://tiles.api-maps.yandex.ru/v1/tiles/?apikey={key}&l=sat,skl&x={x}&y={y}&z={z}&lang=ru_RU'
			};
			var tmpl = urlTemplates[type] || urlTemplates['map'];
			if (yandexApiKey) {
				tileLayer = L.tileLayer(tmpl.replace('{key}', yandexApiKey), { attribution: '© Яндекс', maxZoom: 18, tileSize: 256 });
			} else {
				tileLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OSM', maxZoom: 19 });
			}
			tileLayer.addTo(map);
			// TASK-8 fix: принудительное обновление после смены тайлов
			map.invalidateSize();
			tileLayer.redraw();
			log('Tile layer: ' + type + (yandexApiKey ? ' (Yandex)' : ' (OSM)'));
		}

		// ═══════════════════════════════════════════════════════════
		//   СЛОИ
		// ═══════════════════════════════════════════════════════════
		function createLayer(id, name) {
			var lg = L.layerGroup().addTo(map);
			layers[id] = { name: name, visible: true, group: lg, objects: [] };
			layerOrder.push(id);
			log('Layer created: ' + name + ' id=' + id);
		}
		function addLayerGroup(id, name, parentId) {
			layers[id] = { name: name, visible: true, group: null, objects: [], isGroup: true };
			if (parentId) layers[id].parentId = parentId;
			layerOrder.push(id);
			log('Group created: ' + name + ' id=' + id + (parentId ? ' parent=' + parentId : ''));
		}
		function addLayer(id, name, parentId) {
			var lg = L.layerGroup().addTo(map);
			layers[id] = { name: name, visible: true, group: lg, objects: [] };
			if (parentId) layers[id].parentId = parentId;
			layerOrder.push(id);
			log('Layer created: ' + name + ' id=' + id + (parentId ? ' parent=' + parentId : ''));
			setActiveLayer(id);
		}
		function removeLayer(id) {
			if (!layers[id]) return;
			var name = layers[id].name;
			// Рекурсивно удаляем всех детей перед удалением самого узла
			layerOrder
				.filter(function (cid) { return layers[cid] && layers[cid].parentId === id; })
				.forEach(function (cid) { removeLayer(cid); });
			if (layers[id] && layers[id].group) {
				layers[id].group.clearLayers();
				map.removeLayer(layers[id].group);
			}
			delete layers[id];
			layerOrder = layerOrder.filter(function (x) { return x !== id; });
			if (activeLayerId === id) activeLayerId = layerOrder[layerOrder.length - 1] || null;
			log('Layer removed: ' + name + ' id=' + id);
		}
		function setLayerVisible(id, visible) {
			if (!layers[id]) return;
			layers[id].visible = visible;
			if (layers[id].group) {
				if (visible) map.addLayer(layers[id].group);
				else map.removeLayer(layers[id].group);
			}
			// Если это группа — скрываем/показываем все дочерние слои
			if (layers[id].isGroup) {
				Object.keys(layers).forEach(function (lid) {
					if (layers[lid].parentId === id) {
						setLayerVisible(lid, visible);
					}
				});
			}
			log('Layer visible: ' + id + ' -> ' + visible);
		}
		function setActiveLayer(id) { activeLayerId = id; log('Active layer: ' + id); }
		function renameLayer(id, name) {
			if (layers[id]) {
				var old = layers[id].name;
				layers[id].name = name;
				log('Layer renamed: ' + old + ' -> ' + name);
			}
		}

		function reorderLayers(ids) {
			var newOrder = [];
			ids.forEach(function (id) {
				if (layers[id]) newOrder.push(id);
			});
			layerOrder.forEach(function (id) {
				if (newOrder.indexOf(id) === -1) newOrder.push(id);
			});
			layerOrder = newOrder;
			log('Layer order synced: [' + layerOrder.join(', ') + ']');
		}

		// ═══════════════════════════════════════════════════════════
		//   ИНСТРУМЕНТЫ
		// ═══════════════════════════════════════════════════════════
		function setTool(params) {
			activeTool = params.tool;
			if (activeTool !== 'brush') brushCursorEl.style.display = 'none';
			if (activeTool !== 'eraser') eraserCursorEl.style.display = 'none';
			if (params.color) brushColor = params.color;
			if (params.size) brushSize = params.size;
			if (params.eraserSize) eraserSize = params.eraserSize;
			if (params.fontSize) fontSize = params.fontSize;
			if (params.fontColor) fontColor = params.fontColor;
			if (typeof params.fontBold !== 'undefined') fontBold = params.fontBold;
			if (typeof params.fontItalic !== 'undefined') fontItalic = params.fontItalic;

			document.body.className = 'tool-' + activeTool;

			if (activeTool === 'select') {
				map.dragging.enable();
				eraserCursorEl.style.display = 'none';
			} else if (activeTool === 'text') {
				map.dragging.disable();
				eraserCursorEl.style.display = 'none';
			} else if (activeTool === 'brush' || activeTool === 'eraser') {
				map.dragging.disable();
				if (activeTool === 'eraser') {
					updateEraserCursor();
					brushCursorEl.style.display = 'none';
				} else {
					updateBrushCursor();
					eraserCursorEl.style.display = 'none';
				}
			}

			if (activeTool !== 'select') deselectAll();
			log('Tool: ' + activeTool);
		}

		function setBrushColor(c) { brushColor = c; log('Brush color: ' + c); }
		function setBrushSize(s) {
			brushSize = s;
			updateBrushCursor();
			log('Brush size: ' + s);
		}
		function setEraserSize(s) { eraserSize = s; updateEraserCursor(); log('Eraser size: ' + s); }
		function setFontSize(s) { fontSize = s; log('Font size: ' + s); }
		function setFontColor(c) { fontColor = c; log('Font color: ' + c); }
		function setFontBold(b) { fontBold = b; log('Font bold: ' + b); }
		function setFontItalic(i) { fontItalic = i; log('Font italic: ' + i); }

		function updateEraserCursor() {
			var px = eraserSize * 2;
			eraserCursorEl.style.width = px + 'px';
			eraserCursorEl.style.height = px + 'px';
		}
		function updateBrushCursor() {
			var px = brushSize * 2;
			brushCursorEl.style.width = px + 'px';
			brushCursorEl.style.height = px + 'px';
		}

		// ═══════════════════════════════════════════════════════════
		//   СОБЫТИЯ МЫШИ
		// ═══════════════════════════════════════════════════════════
		function onMapMouseDown(e) {
			if (spaceDown) return;
			if (!activeLayerId || (layers[activeLayerId] && layers[activeLayerId].isGroup)) return;
			if (activeTool === 'brush') { startDrawing(e.latlng); }
			else if (activeTool === 'eraser') { isErasing = true; eraserPath = [e.latlng]; }
			else if (activeTool === 'text') { placeText(e.latlng); }
			else if (activeTool === 'select') { deselectAll(); }  // ← добавить
		}
		function onMapMouseMove(e) {
			if (activeTool === 'eraser' && !spaceDown) {
				var cp = e.containerPoint;
				eraserCursorEl.style.left = cp.x + 'px';
				eraserCursorEl.style.top = cp.y + 'px';
				eraserCursorEl.style.display = 'block';
				if (isErasing) eraserPath.push(e.latlng);
			}
			if (activeTool === 'brush' && !spaceDown) {
				var cp = e.containerPoint;
				brushCursorEl.style.left = cp.x + 'px';
				brushCursorEl.style.top = cp.y + 'px';
				brushCursorEl.style.display = 'block';
				if (isDrawing) continueDrawing(e.latlng);
			}
		}
		function onMapMouseUp(e) {
			if (activeTool === 'brush' && isDrawing) finishDrawing();
			if (activeTool === 'eraser' && isErasing) {
				applyEraser(e.originalEvent && e.originalEvent.shiftKey);
				isErasing = false;
				eraserPath = [];
			}
		}

		// ═══════════════════════════════════════════════════════════
		//   РИСОВАНИЕ КИСТЬЮ
		// ═══════════════════════════════════════════════════════════
		function startDrawing(latlng) {
			isDrawing = true;
			currentPath = [latlng];
			currentPolyline = L.polyline([latlng], {
				color: brushColor,
				weight: brushSize,
				opacity: 0.95,
				smoothFactor: 0,
				lineCap: 'round',
				lineJoin: 'round'
			});
			layers[activeLayerId].group.addLayer(currentPolyline);
			makeObjectInteractive(currentPolyline, activeLayerId);
		}

		function continueDrawing(latlng) {
			if (currentPath.length > 0) {
				var last = currentPath[currentPath.length - 1];
				var dist = map.distance(latlng, last);
				var minDist = (156543 / Math.pow(2, map.getZoom())) * 2; // 4 пикселя в метрах
				if (dist < minDist) return; // слишком близко — пропускаем
			}
			currentPath.push(latlng);
			currentPolyline.setLatLngs(currentPath);
		}

		function rdpSimplify(points, tolerance) {
			if (points.length <= 2) return points;
			var maxDist = 0, maxIdx = 0;
			var start = points[0], end = points[points.length - 1];
			for (var i = 1; i < points.length - 1; i++) {
				var d = perpendicularDist(points[i], start, end);
				if (d > maxDist) { maxDist = d; maxIdx = i; }
			}
			if (maxDist > tolerance) {
				var left = rdpSimplify(points.slice(0, maxIdx + 1), tolerance);
				var right = rdpSimplify(points.slice(maxIdx), tolerance);
				return left.slice(0, -1).concat(right);
			}
			return [start, end];
		}

		function chaikinSmooth(points, iterations) {
			iterations = iterations || 3;
			var pts = points;
			for (var iter = 0; iter < iterations; iter++) {
				var result = [pts[0]]; // сохраняем первую точку
				for (var i = 0; i < pts.length - 1; i++) {
					var p0 = pts[i];
					var p1 = pts[i + 1];
					var q = L.latLng(
						0.75 * p0.lat + 0.25 * p1.lat,
						0.75 * p0.lng + 0.25 * p1.lng
					);
					var r = L.latLng(
						0.25 * p0.lat + 0.75 * p1.lat,
						0.25 * p0.lng + 0.75 * p1.lng
					);
					result.push(q);
					result.push(r);
				}
				result.push(pts[pts.length - 1]); // сохраняем последнюю точку
				pts = result;
			}
			return pts;
		}

		function perpendicularDist(pt, lineStart, lineEnd) {
			var dx = lineEnd.lat - lineStart.lat;
			var dy = lineEnd.lng - lineStart.lng;
			if (dx === 0 && dy === 0) {
				dx = pt.lat - lineStart.lat;
				dy = pt.lng - lineStart.lng;
				return Math.sqrt(dx * dx + dy * dy);
			}
			var t = ((pt.lat - lineStart.lat) * dx + (pt.lng - lineStart.lng) * dy) / (dx * dx + dy * dy);
			t = Math.max(0, Math.min(1, t));
			var nearLat = lineStart.lat + t * dx;
			var nearLng = lineStart.lng + t * dy;
			var dlat = pt.lat - nearLat;
			var dlng = pt.lng - nearLng;
			return Math.sqrt(dlat * dlat + dlng * dlng);
		}

		function finishDrawing() {
			isDrawing = false;
			if (!currentPolyline || currentPath.length < 2) {
				if (currentPolyline) layers[activeLayerId].group.removeLayer(currentPolyline);
				currentPolyline = null; currentPath = [];
				return;
			}

			var metersPerPx = 156543 / Math.pow(2, map.getZoom());
			var toleranceM = metersPerPx * 3;
			var toleranceDeg = toleranceM / 111320;
			var simplified = rdpSimplify(currentPath, toleranceDeg);
			var iterations = simplified.length > 80 ? 2 : 3;
			var smoothed = chaikinSmooth(simplified, iterations);
			currentPolyline.setLatLngs(smoothed);
			currentPolyline.options.smoothFactor = 1.5;

			var obj = {
				id: 'obj_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
				type: 'polyline',
				latlngs: smoothed.map(function (ll) { return [ll.lat, ll.lng]; }),
				color: brushColor,
				weight: brushSize,
				layerId: activeLayerId,
				leafletObj: currentPolyline
			};
			layers[activeLayerId].objects.push(obj);
			pushHistory({ action: 'add', obj: obj });
			log('Line drawn, pts before: ' + currentPath.length + ', after simplify: ' + simplified.length);

			currentPolyline = null; currentPath = [];
			// FIX #2: синхронизировать панель слоёв после добавления объекта
			sendLayersToQt();
			notifyStatus('Линия нарисована');
		}

		// ═══════════════════════════════════════════════════════════
		//   ЛАСТИК
		// ═══════════════════════════════════════════════════════════
		function applyEraser(allLayers) {
			if (eraserPath.length < 1) return;

			var zoom = map.getZoom();
			var metersPerPx = 156543 / Math.pow(2, zoom);
			var eraserRadiusM = eraserSize * metersPerPx;

			log('Eraser radius: ' + eraserRadiusM.toFixed(1) + 'm, pts in path: ' + eraserPath.length);

			var targetLayerIds = allLayers ? Object.keys(layers) : [activeLayerId];

			var allRemoved = [];
			var allAdded = [];

			targetLayerIds.forEach(function (lid) {
				if (!layers[lid] || !layers[lid].group) return;
				var toRemove = [];
				var toAdd = [];
				// Вычислить bbox ластика один раз
				var eBounds = L.latLngBounds(eraserPath).pad((eraserRadiusM / 111320) * 2);

				layers[lid].objects.forEach(function (obj) {
					if (obj.type === 'polyline') {
						// ── BBOX FILTER: пропускаем объекты вне зоны ластика ──
						var objBounds = L.latLngBounds(
							obj.latlngs.map(function (ll) { return L.latLng(ll[0], ll[1]); })
						);
						if (!eBounds.intersects(objBounds)) return;
						var keepSegments = [];
						var currentSeg = [];
						var latlngs = obj.latlngs;

						for (var i = 0; i < latlngs.length; i++) {
							var ptLL = L.latLng(latlngs[i][0], latlngs[i][1]);
							var erased = false;
							for (var j = 0; j < eraserPath.length; j++) {
								if (map.distance(ptLL, eraserPath[j]) <= eraserRadiusM) { erased = true; break; }
							}
							if (!erased) {
								currentSeg.push(latlngs[i]);
							} else {
								if (currentSeg.length >= 2) keepSegments.push(currentSeg.slice());
								currentSeg = [];
							}
						}
						if (currentSeg.length >= 2) keepSegments.push(currentSeg);

						var totalKept = keepSegments.reduce(function (s, seg) { return s + seg.length; }, 0);
						if (totalKept < latlngs.length) {
							layers[lid].group.removeLayer(obj.leafletObj);
							toRemove.push(obj);
							keepSegments.forEach(function (seg) {
								var pl = L.polyline(seg, { color: obj.color, weight: obj.weight, opacity: 0.95, lineCap: 'round', lineJoin: 'round', smoothFactor: 1.5 });
								layers[lid].group.addLayer(pl);
								var newObj = {
									id: 'obj_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
									type: 'polyline', latlngs: seg, color: obj.color, weight: obj.weight,
									layerId: lid, leafletObj: pl
								};
								makeObjectInteractive(pl, lid);
								toAdd.push(newObj);
							});
						}
					} else if (obj.type === 'text' || obj.type === 'image') {
						if (obj.latlng) {
							var ptLL = L.latLng(obj.latlng[0], obj.latlng[1]);
							for (var j = 0; j < eraserPath.length; j++) {
								if (map.distance(ptLL, eraserPath[j]) <= eraserRadiusM) {
									if (obj.leafletObj) layers[lid].group.removeLayer(obj.leafletObj);
									toRemove.push(obj);
									break;
								}
							}
						}
					}
				});

				toRemove.forEach(function (o) { layers[lid].objects = layers[lid].objects.filter(function (x) { return x !== o; }); });
				toAdd.forEach(function (o) { layers[lid].objects.push(o); });
				// накапливаем diff для undo
				toRemove.forEach(function (o) { allRemoved.push(o); });
				toAdd.forEach(function (o) { allAdded.push(o); });
			});

			// FIX #2: синхронизировать панель слоёв после ластика
			sendLayersToQt();
			notifyStatus('Ластик применён');
		}

		if (allRemoved.length > 0 || allAdded.length > 0) {
			pushHistory({ action: 'erase', removed: allRemoved, added: allAdded });
		}

		// ═══════════════════════════════════════════════════════════
		//   ТЕКСТ
		// ═══════════════════════════════════════════════════════════
		function buildTextIcon(text, fSize, fColor, fBold, fItalic) {
			var weight = fBold ? 'bold' : 'normal';
			var style = fItalic ? 'italic' : 'normal';
			var css = style + ' ' + weight + ' ' + fSize + 'px Segoe UI, Arial, sans-serif';
			// FIX #6: text-shadow:none в инлайн-стиле
			return L.divIcon({
				className: '',
				html: '<div class="text-marker-wrap" style="font:' + css + ';color:' + fColor + ';text-shadow:none">' +
					escapeHtml(text) + '</div>',
				iconAnchor: [0, 0],
				iconSize: null
			});
		}

		function placeText(latlng) {
			map.dragging.disable();
			var text = prompt('Введите текст подписи:');

			map._dragging = false;
			if (map.dragging._draggable) map.dragging._draggable._moving = false;

			if (bridge) bridge.onStatus('__SWITCH_SELECT__');

			if (!text) return;

			var icon = buildTextIcon(text, fontSize, fontColor, fontBold, fontItalic);
			var marker = L.marker(latlng, { icon: icon, draggable: true });
			layers[activeLayerId].group.addLayer(marker);

			var obj = {
				id: 'obj_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
				type: 'text', text: text,
				latlng: [latlng.lat, latlng.lng],
				fontSize: fontSize, fontColor: fontColor, fontBold: fontBold, fontItalic: fontItalic,
				layerId: activeLayerId, leafletObj: marker
			};

			marker.on('dragstart', function () {
				if (marker._icon) marker._icon.style.cursor = 'grabbing';
				obj._dragStartLatLng = marker.getLatLng();
				selectObject(obj);
			});
			marker.on('dragend', function (ev) {
				var ll = ev.target.getLatLng();
				var oldLatLng = obj._dragStartLatLng;
				obj.latlng = [ll.lat, ll.lng];
				pushHistory({ action: 'move', obj: obj, oldLatLng: oldLatLng, newLatLng: ll });
				if (marker._icon) marker._icon.style.cursor = '';
				log('Text dragged to ' + ll.lat.toFixed(4) + ',' + ll.lng.toFixed(4));
			});
			marker.on('click', function (ev) {
				L.DomEvent.stopPropagation(ev);
				if (activeTool === 'select') {
					window._lastShift = ev.originalEvent && ev.originalEvent.shiftKey;
					selectObject(obj);
				}
			});
			marker.on('dblclick', function (ev) {
				L.DomEvent.stopPropagation(ev);
				openTextEditDialog(obj, marker);
			});

			layers[activeLayerId].objects.push(obj);
			pushHistory({ action: 'add', obj: obj });
			log('[placeText] Text placed: "' + text + '" id=' + obj.id + ' layer=' + activeLayerId);
			log('[placeText] objects in layer now: ' + layers[activeLayerId].objects.length);
			// Сначала синхронизируем — до notifyStatus, чтобы не перебивать очередь bridge
			sendLayersToQt();
			notifyStatus('Текст добавлен');
		}

		// FIX #7: диалог редактирования текстового объекта через bridge → Python
		function openTextEditDialog(obj, marker) {
			if (!bridge) return;
			var payload = JSON.stringify({
				id: obj.id,
				text: obj.text,
				fontSize: obj.fontSize,
				fontColor: obj.fontColor,
				fontBold: obj.fontBold,
				fontItalic: obj.fontItalic
			});
			bridge.onStatus('__EDIT_TEXT__:' + payload);
		}

		// Вызывается из Python после закрытия диалога
		function applyTextEdit(id, text, fSize, fColor, fBold, fItalic) {
			var obj = null;
			var foundInLayer = null;
			Object.keys(layers).forEach(function (layerId) {
				layers[layerId].objects.forEach(function (o) {
					if (o.id === id) { obj = o; foundInLayer = layerId; }
				});
			});
			if (!obj) { log('[applyTextEdit] ERROR: obj not found id=' + id); return; }
			log('[applyTextEdit] found obj id=' + id + ' in layer=' + foundInLayer + ' old_text="' + obj.text + '" -> new_text="' + text + '"');
			pushHistory({
				action: 'editText', obj: obj,
				oldText: obj.text, oldFontSize: obj.fontSize,
				oldFontColor: obj.fontColor, oldFontBold: obj.fontBold, oldFontItalic: obj.fontItalic
			});
			obj.text = text;
			obj.fontSize = fSize;
			obj.fontColor = fColor;
			obj.fontBold = fBold;
			obj.fontItalic = fItalic;
			var icon = buildTextIcon(text, fSize, fColor, fBold, fItalic);
			obj.leafletObj.setIcon(icon);
			obj.leafletObj.off('dblclick');
			obj.leafletObj.on('dblclick', function (ev) {
				L.DomEvent.stopPropagation(ev);
				openTextEditDialog(obj, obj.leafletObj);
			});
			log('[applyTextEdit] icon updated, syncing layers panel...');
			sendLayersToQt();
			notifyStatus('Текст обновлён');
		}

		function escapeHtml(s) {
			return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
		}

		// ═══════════════════════════════════════════════════════════
		//   ИМПОРТ ИЗОБРАЖЕНИЙ
		// ═══════════════════════════════════════════════════════════

		// Вычислить iconSize с учётом пропорций и коррекции Меркатора
		function calcImageIconSize(naturalW, naturalH, scalePx) {
			// scalePx — желаемая ширина в экранных пикселях
			var w = scalePx;
			var h = scalePx * (naturalH / naturalW);
			return [Math.round(w), Math.round(h)];
		}

		function createImageMarker(fileUrl, naturalW, naturalH, latlng, scale, layerId) {
			var size = calcImageIconSize(naturalW, naturalH, scale);
			var icon = _buildImageIcon(fileUrl, size[0], size[1]);
			var marker = L.marker(latlng, {
				icon: icon,
				draggable: true,
				interactive: true
			});

			var obj = {
				id: 'obj_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
				type: 'image',
				url: fileUrl,
				naturalW: naturalW,
				naturalH: naturalH,
				latlng: [latlng.lat, latlng.lng],
				scale: scale,
				opacity: 0.9,
				layerId: layerId,
				leafletObj: marker
			};

			_attachImageEvents(marker, obj, layerId);
			return obj;
		}

		function _buildImageIcon(url, w, h) {
			return L.divIcon({
				className: '',
				html: '<div class="image-marker-wrap" style="width:' + w + 'px;height:' + h + 'px;">' +
					'<img src="' + url + '" style="width:' + w + 'px;height:' + h + 'px;" />' +
					'<div class="image-resize-handle" data-role="resize">↘</div>' +
					'</div>',
				iconAnchor: [Math.round(w / 2), Math.round(h / 2)],
				iconSize: [w, h]
			});
		}

		function _attachImageEvents(marker, obj, layerId) {
			// drag самого изображения
			marker.on('dragstart', function () {
				obj._dragStartLatLng = marker.getLatLng();
				selectObject(obj);
			});
			marker.on('dragend', function (ev) {
				var ll = ev.target.getLatLng();
				var oldLatLng = obj._dragStartLatLng;
				obj.latlng = [ll.lat, ll.lng];
				pushHistory({ action: 'move', obj: obj, oldLatLng: oldLatLng, newLatLng: ll });
				log('[image] dragged to ' + ll.lat.toFixed(4) + ',' + ll.lng.toFixed(4));
				// Перепозиционируем handle если он показан
				if (selectedObj === obj) _showResizeHandle(obj);
			});
			marker.on('click', function (ev) {
				L.DomEvent.stopPropagation(ev);
				if (activeTool === 'select') selectObject(obj);
			});

			// Resize handle: mousedown на data-role="resize"
			marker.on('add', function () {
				_bindResizeHandle(marker, obj);
			});
		}

		// Вешаем обработчик на handle после добавления маркера в DOM
		function _bindResizeHandle(marker, obj) {
			// Leaflet добавляет _icon чуть позже — ждём
			setTimeout(function () {
				if (!marker._icon) return;
				var handle = marker._icon.querySelector('[data-role="resize"]');
				if (!handle) return;
				handle.addEventListener('mousedown', function (e) {
					e.preventDefault();
					e.stopPropagation();
					_startResize(e, obj);
				});
			}, 50);
		}

		// Активный resize-сеанс
		var _resizeState = null;

		function _startResize(e, obj) {
			map.dragging.disable();
			var startX = e.clientX;
			var startY = e.clientY;
			var startScale = obj.scale;

			_resizeState = { obj: obj, startX: startX, startY: startY, startScale: startScale };

			function onMouseMove(ev) {
				if (!_resizeState) return;
				// Дельта по диагонали: вправо/вниз = увеличение
				var dx = ev.clientX - _resizeState.startX;
				var dy = ev.clientY - _resizeState.startY;
				var delta = (dx + dy) / 2;
				var newScale = Math.max(20, Math.min(2000, _resizeState.startScale + delta));
				_applyImageScale(_resizeState.obj, newScale);
			}

			function onMouseUp() {
				if (_resizeState) {
					var obj2 = _resizeState.obj;
					pushHistory({
						action: 'resizeImage',
						obj: obj2,
						oldScale: _resizeState.startScale,
						newScale: obj2.scale
					});
					log('[image] resize done, scale=' + obj2.scale.toFixed(1));
				}
				_resizeState = null;
				document.removeEventListener('mousemove', onMouseMove);
				document.removeEventListener('mouseup', onMouseUp);
				if (activeTool !== 'select') map.dragging.disable();
				else map.dragging.enable();
			}

			document.addEventListener('mousemove', onMouseMove);
			document.addEventListener('mouseup', onMouseUp);
		}

		function _applyImageScale(obj, newScale) {
			obj.scale = newScale;
			var size = calcImageIconSize(obj.naturalW, obj.naturalH, newScale);
			var newIcon = _buildImageIcon(obj.url, size[0], size[1]);
			obj.leafletObj.setIcon(newIcon);
			// Перепривязываем handle после setIcon (он пересоздаёт DOM)
			setTimeout(function () {
				_bindResizeHandle(obj.leafletObj, obj);
			}, 60);
		}

		function _showResizeHandle(obj) {
			// Handle уже встроен в divIcon — ничего дополнительного не нужно
			// Просто перепривязываем события после selectObject
			setTimeout(function () {
				_bindResizeHandle(obj.leafletObj, obj);
			}, 30);
		}

		function importImage(fileUrl, naturalW, naturalH) {
			var center = map.getCenter();
			// Базовый размер — ~25% ширины вьюпорта в пикселях
			var baseScale = Math.round(map.getSize().x * 0.25);
			baseScale = Math.max(80, Math.min(600, baseScale));

			var latlng = L.latLng(center.lat, center.lng);
			var obj = createImageMarker(fileUrl, naturalW, naturalH, latlng, baseScale, activeLayerId);

			layers[activeLayerId].group.addLayer(obj.leafletObj);
			layers[activeLayerId].objects.push(obj);
			pushHistory({ action: 'add', obj: obj });
			log('[image] imported: ' + fileUrl + ' natural=' + naturalW + 'x' + naturalH + ' scale=' + baseScale);
			sendLayersToQt();
			notifyStatus('Изображение импортировано');
		}

		// ═══════════════════════════════════════════════════════════
		//   ВЫБОР
		// ═══════════════════════════════════════════════════════════
		function makeObjectInteractive(leafletObj, layerId) {
			leafletObj.on('click', function (ev) {
				if (activeTool !== 'select') return;
				L.DomEvent.stopPropagation(ev);
				window._lastShift = ev.originalEvent && ev.originalEvent.shiftKey;
				if (!layers[layerId]) return;
				var found = layers[layerId].objects.filter(function (o) { return o.leafletObj === leafletObj; })[0];
				if (found) selectObject(found);
			});

		}
		function selectObject(obj) {
			log('[selectObject] id=' + obj.id + ' shift=' + (window._lastShift || false));
			if (!window._lastShift) {
				deselectAll();
			}
			selectedObj = obj;
			if (obj.leafletObj) {
				if (obj.leafletObj.setStyle) obj.leafletObj.setStyle({ color: '#00aaff', weight: (obj.weight || 4) + 2 });
				if (obj.leafletObj._icon && obj.type === 'image') {
					obj.leafletObj._icon.querySelector('.image-marker-wrap img') &&
						(obj.leafletObj._icon.querySelector('.image-marker-wrap').classList.add('image-selected'));
					_showResizeHandle(obj);
				} else if (obj.leafletObj._icon && obj.type !== 'text') {
					obj.leafletObj._icon.style.outline = '2px solid #00aaff';
				}

			}
			log('Selected: ' + obj.type + ' id=' + obj.id);
			// Сообщаем Python id выбранного объекта
			if (bridge) bridge.onStatus('__SELECTED__' + (window._lastShift ? '_ADD' : '') + ':' + obj.id);
			notifyStatus('Объект выбран: ' + obj.type);
		}
		function deselectAll() {
			if (!selectedObj) return;
			if (selectedObj.leafletObj) {
				if (selectedObj.leafletObj.setStyle) selectedObj.leafletObj.setStyle({ color: selectedObj.color || brushColor, weight: selectedObj.weight || brushSize });
				if (selectedObj.leafletObj._icon && selectedObj.type === 'image') {
					var wrap = selectedObj.leafletObj._icon.querySelector('.image-marker-wrap');
					if (wrap) wrap.classList.remove('image-selected');
				} else if (selectedObj.leafletObj._icon && selectedObj.type !== 'text') {
					selectedObj.leafletObj._icon.style.outline = '';
				}

			}
			selectedObj = null;
			if (bridge) bridge.onStatus('__SELECTED__:');  // пустой id = ничего не выбрано
		}
		function selectObjectById(id) {
			var found = null;
			Object.keys(layers).forEach(function (lid) {
				layers[lid].objects.forEach(function (o) {
					if (o.id === id) found = o;
				});
			});
			if (found) selectObject(found);
			else log('[selectObjectById] not found: ' + id);
		}
		function deleteSelected(forceId) {
			try {
				// Массив id — мультиудаление без sendLayersToQt внутри цикла
				if (Array.isArray(forceId)) {
					forceId.forEach(function (id) {
						var obj = null;
						Object.keys(layers).forEach(function (lid) {
							layers[lid].objects.forEach(function (o) {
								if (o.id === id) obj = o;
							});
						});
						if (!obj) { log('[deleteSelected] id not found: ' + id); return; }
						var lid = obj.layerId;
						if (layers[lid] && layers[lid].group) {
							layers[lid].group.removeLayer(obj.leafletObj);
							layers[lid].objects = layers[lid].objects.filter(function (o) { return o !== obj; });
						}
						pushHistory({ action: 'delete', obj: obj });
						if (selectedObj === obj) selectedObj = null;
						log('[deleteSelected] removed ' + obj.type + ' id=' + obj.id);
					});
					sendLayersToQt();
					notifyStatus('Объектов удалено: ' + forceId.length);
					return;
				}

				// Одиночное удаление — старый код без изменений
				var obj = selectedObj;
				if (!obj && forceId) {
					Object.keys(layers).forEach(function (lid) {
						layers[lid].objects.forEach(function (o) {
							if (o.id === forceId) obj = o;
						});
					});
				}
				if (!obj) { log('[deleteSelected] nothing selected'); return; }
				var lid = obj.layerId;
				log('[deleteSelected] removing ' + obj.type + ' id=' + obj.id + ' from layer=' + lid);
				if (layers[lid] && layers[lid].group) {
					layers[lid].group.removeLayer(obj.leafletObj);
					layers[lid].objects = layers[lid].objects.filter(function (o) { return o !== obj; });
					log('[deleteSelected] layer objects remaining: ' + layers[lid].objects.length);
				} else {
					log('[deleteSelected] ERROR: layer ' + lid + ' not found!');
				}
				log('[deleteSelected] calling pushHistory...');
				pushHistory({ action: 'delete', obj: obj });
				log('[deleteSelected] pushHistory OK, calling sendLayersToQt...');
				if (selectedObj === obj) selectedObj = null;
				sendLayersToQt();
				notifyStatus('Объект удалён');
			} catch (e) {
				log('[deleteSelected] EXCEPTION: ' + e + ' | stack: ' + (e.stack || 'n/a'));
			}
		}


		// ═══════════════════════════════════════════════════════════
		//   ИСТОРИЯ
		// ═══════════════════════════════════════════════════════════
		function pushHistory(record) {
			undoHistory.push(record);
			// BUG-PUSHHISTORY fix: было history.shift() — конфликт с window.history
			if (undoHistory.length > MAX_HISTORY) undoHistory.shift();
			log('History push: ' + record.action + ' (' + undoHistory.length + ' total)');
		}

		function undoAction() {
			if (undoHistory.length === 0) { notifyStatus('Нечего отменять'); log('Undo: history empty'); return; }
			var rec = undoHistory.pop();
			log('Undo: ' + rec.action + (rec.obj ? ' ' + rec.obj.type : ''));
			if (rec.action === 'erase') {
				rec.added.forEach(function (obj) {
					if (layers[obj.layerId] && layers[obj.layerId].group) {
						layers[obj.layerId].group.removeLayer(obj.leafletObj);
						layers[obj.layerId].objects = layers[obj.layerId].objects.filter(function (o) { return o !== obj; });
					}
				});
				rec.removed.forEach(function (obj) {
					if (layers[obj.layerId] && obj.leafletObj) {
						layers[obj.layerId].group.addLayer(obj.leafletObj);
						layers[obj.layerId].objects.push(obj);
					}
				});
			} else if (rec.action === 'add') {
				var obj = rec.obj;
				if (layers[obj.layerId]) {
					layers[obj.layerId].group.removeLayer(obj.leafletObj);
					layers[obj.layerId].objects = layers[obj.layerId].objects.filter(function (o) { return o !== obj; });
				}
			} else if (rec.action === 'move') {
				var obj = rec.obj;
				obj.leafletObj.setLatLng(rec.oldLatLng);
				obj.latlng = [rec.oldLatLng.lat, rec.oldLatLng.lng];
			} else if (rec.action === 'editText') {
				var obj = rec.obj;
				obj.text = rec.oldText;
				obj.fontSize = rec.oldFontSize;
				obj.fontColor = rec.oldFontColor;
				obj.fontBold = rec.oldFontBold;
				obj.fontItalic = rec.oldFontItalic;
				var icon = buildTextIcon(obj.text, obj.fontSize, obj.fontColor, obj.fontBold, obj.fontItalic);
				obj.leafletObj.setIcon(icon);
			} else if (rec.action === 'resizeImage') {
				_applyImageScale(rec.obj, rec.oldScale);
			} else if (rec.action === 'delete') {
				var obj = rec.obj;
				if (layers[obj.layerId] && obj.leafletObj) {
					layers[obj.layerId].group.addLayer(obj.leafletObj);
					layers[obj.layerId].objects.push(obj);
				}
			} else if (rec.action === 'erase') {
				// Убираем добавленные (нарезанные) сегменты
				rec.added.forEach(function (obj) {
					if (layers[obj.layerId] && layers[obj.layerId].group) {
						layers[obj.layerId].group.removeLayer(obj.leafletObj);
						layers[obj.layerId].objects = layers[obj.layerId].objects.filter(function (o) { return o !== obj; });
					}
				});
				// Восстанавливаем удалённые оригиналы
				rec.removed.forEach(function (obj) {
					if (layers[obj.layerId] && obj.leafletObj) {
						layers[obj.layerId].group.addLayer(obj.leafletObj);
						layers[obj.layerId].objects.push(obj);
					}
				});
			}
			// FIX #2: синхронизировать панель слоёв после undo
			sendLayersToQt();
			notifyStatus('Отменено');
		}

		// ═══════════════════════════════════════════════════════════
		//   СОХРАНЕНИЕ / ЗАГРУЗКА
		// ═══════════════════════════════════════════════════════════
		function saveProject(path) {
			if (path) currentProjectPath = path;
			var data = {
				version: '1.0', center: [map.getCenter().lat, map.getCenter().lng],
				zoom: map.getZoom(), tileType: currentTileType, activeLayerId: activeLayerId,
				layers: (function () {
					function serializeNode(lid) {
						var lyr = layers[lid];
						if (lyr.isGroup) {
							var children = layerOrder
								.filter(function (cid) { return layers[cid] && layers[cid].parentId === lid; })
								.map(serializeNode);
							return {
								id: lid, name: lyr.name, visible: lyr.visible, isGroup: true,
								localOpacity: lyr.localOpacity !== undefined ? lyr.localOpacity : 100,
								children: children
							};
						} else {
							return {
								id: lid, name: lyr.name, visible: lyr.visible, isGroup: false,
								localOpacity: lyr.localOpacity !== undefined ? lyr.localOpacity : 100,
								objects: (lyr.objects || []).map(serializeObject)
							};
						}
					}
					// Только top-level узлы (без parentId)
					return layerOrder
						.filter(function (lid) { return layers[lid] && !layers[lid].parentId; })
						.map(serializeNode);
				})()
			};
			if (bridge) bridge.saveProjectData(JSON.stringify(data, null, 2));
			log('Project saved to: ' + currentProjectPath);
		}

		function serializeObject(obj) {
			var s = { id: obj.id, type: obj.type, layerId: obj.layerId, visible: obj.visible !== false };
			if (obj.type === 'polyline') { s.latlngs = obj.latlngs; s.color = obj.color; s.weight = obj.weight; s.localOpacity = obj.localOpacity !== undefined ? obj.localOpacity : 100; }
			else if (obj.type === 'text') { s.text = obj.text; s.latlng = obj.latlng; s.fontSize = obj.fontSize; s.fontColor = obj.fontColor; s.fontBold = obj.fontBold; s.fontItalic = obj.fontItalic; s.localOpacity = obj.localOpacity !== undefined ? obj.localOpacity : 100; }
			else if (obj.type === 'image') {
				s.url = obj.url;
				s.latlng = obj.latlng;
				s.naturalW = obj.naturalW || 800;
				s.naturalH = obj.naturalH || 600;
				s.scale = obj.scale || 200;
				s.opacity = obj.opacity || 0.9;
				s.localOpacity = obj.localOpacity !== undefined ? obj.localOpacity : 100;
			}
			return s;
		}

		function loadProject(jsonStr) {
			var data;
			try { data = JSON.parse(jsonStr); } catch (ex) { if (bridge) bridge.onError('Ошибка: ' + ex.message); return; }
			Object.keys(layers).forEach(function (lid) {
				if (layers[lid].group) { layers[lid].group.clearLayers(); map.removeLayer(layers[lid].group); }
			});
			layers = {}; layerOrder = []; undoHistory = [];
			if (data.center) map.setView(data.center, data.zoom || 5);
			if (data.tileType) changeTileLayer(data.tileType, yandexApiKey);
			function restoreNode(node, parentId) {
				if (node.isGroup) {
					layers[node.id] = {
						name: node.name, visible: node.visible !== false,
						group: null, objects: [], isGroup: true,
						localOpacity: node.localOpacity !== undefined ? node.localOpacity : 100
					};
					if (parentId) layers[node.id].parentId = parentId;
					layerOrder.push(node.id);
					(node.children || []).forEach(function (child) { restoreNode(child, node.id); });
				} else {
					var lg = L.layerGroup();
					var parentVisible = parentId ? (layers[parentId] && layers[parentId].visible !== false) : true;
					if (node.visible !== false && parentVisible) lg.addTo(map);
					layers[node.id] = {
						name: node.name, visible: node.visible !== false,
						group: lg, objects: [],
						localOpacity: node.localOpacity !== undefined ? node.localOpacity : 100
					};
					if (parentId) layers[node.id].parentId = parentId;
					layerOrder.push(node.id);
					(node.objects || []).forEach(function (obj) { restoreObject(obj, node.id); });
				}
			}
			(data.layers || []).forEach(function (lyr) { restoreNode(lyr, null); });
			// Применяем opacity всех слоёв после загрузки
			Object.keys(layers).forEach(function (lid) {
				if (!layers[lid].isGroup) {
					var inherited = _getParentEffective(lid);
					var layerLocal = layers[lid].localOpacity !== undefined ? layers[lid].localOpacity : 100;
					_applyEffectiveToLayer(lid, layerLocal * inherited / 100);
				}
			});
			if (data.activeLayerId && layers[data.activeLayerId]) setActiveLayer(data.activeLayerId);
			sendLayersToQt();
			notifyStatus('Проект загружен');
			log('Project loaded: ' + (data.layers || []).length + ' layers');
		}

		function restoreObject(obj, layerId) {
			var lyr = layers[layerId];
			if (!lyr || !lyr.group) return;
			if (obj.type === 'polyline') {
				var pl = L.polyline(obj.latlngs, { color: obj.color, weight: obj.weight, opacity: 0.95, lineCap: 'round', lineJoin: 'round', smoothFactor: 1.5 });
				lyr.group.addLayer(pl);
				var r = Object.assign({}, obj, { leafletObj: pl, localOpacity: obj.localOpacity !== undefined ? obj.localOpacity : 100 });
				makeObjectInteractive(pl, layerId);
				lyr.objects.push(r);
			} else if (obj.type === 'text') {
				var ll = L.latLng(obj.latlng[0], obj.latlng[1]);
				var icon = buildTextIcon(obj.text, obj.fontSize, obj.fontColor, obj.fontBold, obj.fontItalic);
				var marker = L.marker(ll, { icon: icon, draggable: true });
				lyr.group.addLayer(marker);
				var rObj = Object.assign({}, obj, { leafletObj: marker });
				marker.on('dragstart', function () {
					if (marker._icon) marker._icon.style.cursor = 'grabbing';
					rObj._dragStartLatLng = marker.getLatLng();
					selectObject(rObj);
				});
				marker.on('dragend', function (ev) {
					var ll2 = ev.target.getLatLng();
					var oldLatLng = rObj._dragStartLatLng;
					rObj.latlng = [ll2.lat, ll2.lng];
					pushHistory({ action: 'move', obj: rObj, oldLatLng: oldLatLng, newLatLng: ll2 });
					if (marker._icon) marker._icon.style.cursor = '';
				});
				marker.on('click', function (ev) {
					L.DomEvent.stopPropagation(ev);
					window._lastShift = ev.originalEvent && ev.originalEvent.shiftKey;
					selectObject(rObj);
				});
				marker.on('dblclick', function (ev) {
					L.DomEvent.stopPropagation(ev);
					openTextEditDialog(rObj, marker);
				});
				lyr.objects.push(rObj);
			} else if (obj.type === 'image') {
				var ll = L.latLng(obj.latlng[0], obj.latlng[1]);
				var sc = obj.scale || 200;
				var nw = obj.naturalW || 800;
				var nh = obj.naturalH || 600;
				var iObj = createImageMarker(obj.url, nw, nh, ll, sc, layerId);
				iObj.id = obj.id;
				iObj.layerId = layerId;
				iObj.localOpacity = obj.localOpacity !== undefined ? obj.localOpacity : 100;
				iObj.opacity = obj.opacity || 0.9;
				lyr.group.addLayer(iObj.leafletObj);
				lyr.objects.push(iObj);
			}

		}

		// ═══════════════════════════════════════════════════════════
		//   ДЕРЕВО СЛОЁВ
		// ═══════════════════════════════════════════════════════════
		// ── DEBOUNCED sendLayersToQt ──────────────────────────────
		var _sendLayersTimer = null;
		function sendLayersToQt() {
			if (!bridge) {
				log('[WARN] sendLayersToQt: bridge not ready, retry in 200ms...');
				setTimeout(sendLayersToQt, 200);
				return;
			}
			if (_sendLayersTimer) clearTimeout(_sendLayersTimer);
			_sendLayersTimer = setTimeout(_doSendLayersToQt, 100);
		}
		function _doSendLayersToQt() {
			_sendLayersTimer = null;

			function buildNode(lid) {
				var lyr = layers[lid];
				if (lyr.isGroup) {
					var children = layerOrder
						.filter(function (cid) { return layers[cid] && layers[cid].parentId === lid; })
						.map(buildNode);
					return {
						id: lid, name: lyr.name, isGroup: true, visible: lyr.visible,
						localOpacity: lyr.localOpacity !== undefined ? lyr.localOpacity : 100,
						children: children
					};
				} else {
					var objects = (lyr.objects || []).map(function (o) {
						return {
							id: o.id, type: o.type,
							label: o.type === 'text' ? o.text : (o.type === 'image' ? 'Изображение' : 'Линия'),
							visible: o.visible !== false,
							localOpacity: o.localOpacity !== undefined ? o.localOpacity : 100
						};
					});
					return {
						id: lid, name: lyr.name, isGroup: false, visible: lyr.visible,
						localOpacity: lyr.localOpacity !== undefined ? lyr.localOpacity : 100,
						objects: objects
					};
				}
			}

			// Только top-level узлы (без parentId)
			var result = layerOrder
				.filter(function (lid) { return layers[lid] && !layers[lid].parentId; })
				.map(buildNode);

			var totalObjects = result.reduce(function (sum, node) {
				if (node.isGroup) return sum + (node.children || []).reduce(function (s, c) { return s + (c.objects || []).length; }, 0);
				return sum + (node.objects || []).length;
			}, 0);

			log('[sendLayersToQt] sending ' + result.length + ' top-level nodes, ' + totalObjects + ' total objects');
			try { bridge.onLayersData(JSON.stringify(result)); }
			catch (e) { log('[sendLayersToQt] ERROR: ' + e); }
		}

		function setObjectVisible(objId, visible) {
			Object.keys(layers).forEach(function (lid) {
				layers[lid].objects.forEach(function (o) {
					if (o.id === objId) {
						o.visible = visible;
						if (o.leafletObj) {
							if (visible) layers[lid].group.addLayer(o.leafletObj);
							else layers[lid].group.removeLayer(o.leafletObj);
						}
						log('Object visible: ' + objId + ' -> ' + visible);
					}
				});
			});
		}

		function _getParentEffective(layerId) {
			var lyr = layers[layerId];
			if (!lyr || !lyr.parentId) return 100;
			var parent = layers[lyr.parentId];
			if (!parent) return 100;
			return (parent.localOpacity !== undefined ? parent.localOpacity : 100)
				* _getParentEffective(lyr.parentId) / 100;
		}

		function _applyEffectiveToLayer(layerId, inheritedOpacity) {
			var lyr = layers[layerId];
			if (!lyr || !lyr.objects) return;
			lyr.objects.forEach(function (o) {
				var objLocal = o.localOpacity !== undefined ? o.localOpacity : 100;
				var effective = objLocal * inheritedOpacity / 100;
				_applyOpacityToLeaflet(o, effective);
			});
		}

		function _applyOpacityToLeaflet(o, effectivePercent) {
			if (!o.leafletObj) return;
			var v = effectivePercent / 100;
			if (o.leafletObj.setStyle) {
				o.leafletObj.setStyle({ opacity: v, fillOpacity: v * 0.3 });
			} else if (o.leafletObj.setOpacity) {
				o.leafletObj.setOpacity(v);
			}
		}

		function setLayerOpacity(id, value) {
			if (!layers[id]) return;
			layers[id].localOpacity = value;
			var inherited = _getParentEffective(id);
			var effective = value * inherited / 100;
			_applyEffectiveToLayer(id, effective);
			log('Layer opacity: ' + id + ' -> local=' + value + '% effective=' + effective.toFixed(1) + '%');
		}

		function setObjectOpacity(objId, value) {
			Object.keys(layers).forEach(function (lid) {
				layers[lid].objects.forEach(function (o) {
					if (o.id !== objId) return;
					o.localOpacity = value;
					var layerLocal = layers[lid].localOpacity !== undefined ? layers[lid].localOpacity : 100;
					var inherited = layerLocal * _getParentEffective(lid) / 100;
					var effective = value * inherited / 100;
					_applyOpacityToLeaflet(o, effective);
					log('Object opacity: ' + objId + ' -> local=' + value + '% effective=' + effective.toFixed(1) + '%');
				});
			});
		}

		function setGroupOpacity(groupId, value) {
			if (!layers[groupId]) return;
			layers[groupId].localOpacity = value;
			var inherited = _getParentEffective(groupId);
			var effective = value * inherited / 100;
			Object.keys(layers).forEach(function (lid) {
				if (layers[lid].parentId === groupId) {
					layers[lid].localOpacity = layers[lid].localOpacity !== undefined ? layers[lid].localOpacity : 100;
					var childEffective = layers[lid].localOpacity * effective / 100;
					_applyEffectiveToLayer(lid, childEffective);
				}
			});
			log('Group opacity: ' + groupId + ' -> local=' + value + '% effective=' + effective.toFixed(1) + '%');
		}


		function notifyStatus(msg) { if (bridge) bridge.onStatus(msg); }

		function startSpacePan() {
			if (spaceDown) return;
			spaceDown = true;
			map.dragging.enable();
			map.getContainer().style.cursor = 'grab';
		}

		function stopSpacePan() {
			spaceDown = false;
			// восстанавливаем dragging согласно текущему инструменту
			var toolsWithDragging = ['select'];
			if (toolsWithDragging.indexOf(activeTool) === -1) {
				map.dragging.disable();
			}
			map.getContainer().style.cursor = '';
			setTool({ tool: activeTool }); // восстанавливаем курсор инструмента
		}

		document.addEventListener('mouseleave', function () {
			eraserCursorEl.style.display = 'none';
			brushCursorEl.style.display = 'none';
		});

		document.addEventListener('keydown', function (e) { window._lastShift = e.shiftKey; });
		document.addEventListener('keyup', function (e) { window._lastShift = e.shiftKey; });

	</script>
